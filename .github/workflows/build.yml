name: Build QMK Firmware

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout user keymap
        uses: actions/checkout@v4
        with:
          path: user_keymap

      - name: Checkout official QMK firmware
        uses: actions/checkout@v4
        with:
          repository: qmk/qmk_firmware
          path: qmk_firmware
          submodules: true

      - name: Setup Build Environment
        run: |
          # Install the ARM GCC toolchain required for RP2040 compilation
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi
          # Setup QMK
          python3 -m pip install qmk
          qmk setup -H ./qmk_firmware -y

      - name: Copy keymap into QMK directory
        run: |
          mkdir -p ./qmk_firmware/keyboards/crkbd/keymaps/nugatio
          # Copy your repo's code into the correct QMK directory structure
          cp -r ./user_keymap/* ./qmk_firmware/keyboards/crkbd/keymaps/nugatio/
          # Remove the github folder from the keymap copy so QMK doesn't get confused
          rm -rf ./qmk_firmware/keyboards/crkbd/keymaps/nugatio/.github

      - name: Compile Left and Right EE_HANDS firmware (RP2040)
        run: |
          cd qmk_firmware
          # Build the Left half specific UF2
          make crkbd:nugatio:uf2-split-left CONVERT_TO=rp2040_ce
          # Build the Right half specific UF2
          make crkbd:nugatio:uf2-split-right CONVERT_TO=rp2040_ce

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nugatio-corne-rp2040-firmware
          path: qmk_firmware/*.uf2
          compression-level: 0
